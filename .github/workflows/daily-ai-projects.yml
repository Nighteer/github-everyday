name: Daily AI GitHub Projects

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily job
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          NOTIFY_PROVIDER: ${{ vars.NOTIFY_PROVIDER }}
          MAX_PUSH_COUNT: ${{ vars.MAX_PUSH_COUNT }}
          CANDIDATE_LIMIT: ${{ vars.CANDIDATE_LIMIT }}
          README_FETCH_LIMIT: ${{ vars.README_FETCH_LIMIT }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          MIN_STARS: ${{ vars.MIN_STARS }}
          CREATED_DAYS: ${{ vars.CREATED_DAYS }}
          PUSHED_DAYS: ${{ vars.PUSHED_DAYS }}
          TZ: Asia/Shanghai
        run: python -m src.main

      - name: Commit updated store
        run: |
          if git diff --quiet data/pushed_projects.json; then
            echo "No store changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/pushed_projects.json
          git commit -m "chore: update pushed projects store"
          git push
